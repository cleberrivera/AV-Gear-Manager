services:
  mysql:
    image: mysql:8.0
    container_name: avmanager-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: avmanager123
      MYSQL_DATABASE: av_gear_manager
      MYSQL_USER: avmanager
      MYSQL_PASSWORD: avmanager123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
